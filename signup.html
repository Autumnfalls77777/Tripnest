<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | TripNest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-sunset"></div>
    <div class="bg-map"></div>
    <div class="bg-noise"></div>

    <a href="index.html" class="back-home">
      <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <main class="auth-container">
      <div class="auth-card">
        <!-- Brand mark -->
        <div style="text-align:center; margin-bottom:6px;">
          <div style="width:52px;height:52px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#FF9F1C,#FF4D6D,#6C4AB6);color:#050508;font-weight:900;font-family:'Space Grotesk',sans-serif;font-size:15px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(255,77,109,0.35);">TN</div>
        </div>
        <h2>Create Account</h2>
        <p>Join TripNest and unlock smarter travel planning</p>

        <form class="auth-form" id="signupForm">
          <div class="form-group">
            <label for="fullname"><i class="fa-regular fa-user" style="margin-right:6px;opacity:0.6;"></i>Full Name</label>
            <input type="text" id="fullname" placeholder="e.g. Prateek Rai" required />
          </div>

          <div class="form-group">
            <label for="email"><i class="fa-regular fa-envelope" style="margin-right:6px;opacity:0.6;"></i>Email Address</label>
            <input type="email" id="email" placeholder="john@example.com" required />
          </div>

          <div class="form-group">
            <label for="password"><i class="fa-solid fa-lock" style="margin-right:6px;opacity:0.6;"></i>Password</label>
            <input type="password" id="password" placeholder="Create a strong password" required />
          </div>

          <div class="form-group">
            <label for="confirm_password"><i class="fa-solid fa-shield-halved" style="margin-right:6px;opacity:0.6;"></i>Confirm Password</label>
            <input type="password" id="confirm_password" placeholder="Repeat password" required />
          </div>

          <button type="submit" class="auth-btn">
            Create Account &nbsp;<i class="fa-solid fa-user-plus"></i>
          </button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="signin.html">Sign In</a>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
    <script>
      document.querySelectorAll('a[href]').forEach(a => {
        if (!a.href.startsWith('#') && a.href !== window.location.href) {
          a.addEventListener('click', e => {
            e.preventDefault(); const href = a.href;
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.25s ease';
            setTimeout(() => { window.location = href; }, 260);
          });
        }
      });
    </script>
  </body>
</html>
