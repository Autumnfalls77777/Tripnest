<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Planning | TripNest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Page layout ── */
    .plan-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 40px;
      position: relative;
      z-index: 1;
    }

    .plan-card {
      width: 100%;
      max-width: 540px;
      background: rgba(11,11,16,0.72);
      border: 1px solid rgba(245,230,200,0.1);
      border-radius: 32px;
      padding: 44px 40px 40px;
      box-shadow: 0 40px 120px rgba(0,0,0,0.6), inset 0 1px 0 rgba(245,230,200,0.07);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      animation: cardIn 0.6s cubic-bezier(0.25,0.8,0.25,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform: translateY(28px) scale(0.97); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .plan-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .plan-brand-mark {
      width: 46px; height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, #FF9F1C, #FF4D6D, #6C4AB6);
      display: grid; place-items: center;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 900; font-size: 15px; color: #050508;
      box-shadow: 0 8px 24px rgba(255,77,109,0.35);
      flex-shrink: 0;
    }
    .plan-brand-text h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 800; color: #F5E6C8;
      letter-spacing: -0.3px; line-height: 1.1;
    }
    .plan-brand-text p {
      font-size: 13px; opacity: 0.5; margin: 0; font-family: 'Outfit', sans-serif;
    }

    /* Section divider */
    .plan-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(245,230,200,0.12), transparent);
      margin: 24px 0;
    }

    /* Field group */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }
    .field-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.2px; text-transform: uppercase;
      opacity: 0.55; color: #F5E6C8;
    }

    /* Input wrapper */
    .input-row {
      position: relative;
      display: flex;
      align-items: center;
    }
    .field-icon {
      position: absolute; left: 16px;
      color: rgba(245,230,200,0.35);
      font-size: 15px; pointer-events: none;
      transition: color 0.2s ease;
      z-index: 2;
    }
    .plan-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(7,7,16,0.65);
      border: 1px solid rgba(245,230,200,0.1);
      border-radius: 14px;
      color: #F5E6C8;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }
    .plan-input::placeholder { color: rgba(245,230,200,0.28); }
    .plan-input:focus {
      outline: none;
      border-color: rgba(255,159,28,0.5);
      background: rgba(7,7,16,0.85);
      box-shadow: 0 0 0 3px rgba(255,159,28,0.1);
    }
    .input-row:focus-within .field-icon {
      color: rgba(255,159,28,0.7);
    }

    /* GPS button inside location input */
    .gps-btn {
      position: absolute; right: 12px;
      background: rgba(46,196,182,0.12);
      border: 1px solid rgba(46,196,182,0.25);
      color: #2EC4B6;
      width: 32px; height: 32px;
      border-radius: 10px;
      display: grid; place-items: center;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .gps-btn:hover {
      background: rgba(46,196,182,0.25);
      transform: scale(1.1);
      box-shadow: 0 4px 14px rgba(46,196,182,0.25);
    }
    .gps-btn.loading {
      animation: gpsSpin 1s linear infinite;
      pointer-events: none;
    }
    @keyframes gpsSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Globe button inside destination input */
    .globe-btn {
      position: absolute; right: 12px;
      background: rgba(108,74,182,0.15);
      border: 1px solid rgba(108,74,182,0.3);
      color: #a78bfa;
      width: 32px; height: 32px;
      border-radius: 10px;
      display: grid; place-items: center;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .globe-btn:hover {
      background: rgba(108,74,182,0.3);
      transform: scale(1.1);
      box-shadow: 0 4px 14px rgba(108,74,182,0.3);
    }

    /* 2-col row */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 18px;
    }
    .two-col .field-group { margin-bottom: 0; }

    /* Stepper */
    .stepper {
      display: flex; align-items: center;
      background: rgba(7,7,16,0.65);
      border: 1px solid rgba(245,230,200,0.1);
      border-radius: 14px;
      height: 50px;
      overflow: hidden;
    }
    .step-btn {
      width: 42px; height: 100%;
      background: transparent;
      border: none; color: rgba(245,230,200,0.6);
      cursor: pointer; font-size: 12px;
      transition: all 0.2s ease;
      display: grid; place-items: center;
    }
    .step-btn:hover { background: rgba(255,159,28,0.15); color: #FF9F1C; }
    .stepper input {
      flex: 1; background: transparent; border: none;
      text-align: center; color: #F5E6C8;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; font-size: 17px;
    }
    .stepper input:focus { outline: none; }

    /* Submit */
    .plan-submit {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #FF9F1C 0%, #FF6B5E 50%, #FF4D6D 100%);
      border: none; border-radius: 16px;
      color: #050508;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 13px; letter-spacing: 1.2px;
      text-transform: uppercase; cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,77,109,0.3);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 8px;
    }
    .plan-submit:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 10px 35px rgba(255,77,109,0.4);
    }
    .plan-submit:active { transform: scale(0.98) translateY(1px); }

    /* GPS status chip */
    .gps-chip {
      display: none;
      align-items: center; gap: 8px;
      padding: 8px 12px;
      background: rgba(46,196,182,0.1);
      border: 1px solid rgba(46,196,182,0.2);
      border-radius: 10px;
      font-size: 12px; color: #2EC4B6;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700; margin-top: 6px;
    }
    .gps-chip.show { display: flex; animation: chipIn 0.3s ease; }
    @keyframes chipIn {
      from { opacity:0; transform:translateY(-4px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── GLOBE MODAL ── */
    .globe-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(7,7,16,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      align-items: center; justify-content: center;
      flex-direction: column;
    }
    .globe-overlay.open {
      display: flex;
      animation: overlayIn 0.3s ease;
    }
    @keyframes overlayIn {
      from { opacity:0; }
      to   { opacity:1; }
    }

    .globe-modal {
      width: min(660px, 95vw);
      background: rgba(14,12,24,0.95);
      border: 1px solid rgba(245,230,200,0.1);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
      animation: modalIn 0.35s cubic-bezier(0.25,0.8,0.25,1);
    }
    @keyframes modalIn {
      from { opacity:0; transform: scale(0.92) translateY(20px); }
      to   { opacity:1; transform: scale(1) translateY(0); }
    }

    .globe-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(245,230,200,0.07);
    }
    .globe-header h3 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px; font-weight: 700; color: #F5E6C8;
    }
    .globe-header p {
      font-size: 13px; opacity: 0.5; margin: 2px 0 0;
      font-family: 'Outfit', sans-serif;
    }
    .globe-close {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.2);
      color: #FF4D6D; font-size: 16px; cursor: pointer;
      display: grid; place-items: center;
      transition: all 0.2s ease;
    }
    .globe-close:hover {
      background: #FF4D6D; color: white;
      transform: rotate(90deg);
    }

    .globe-body {
      display: grid;
      grid-template-columns: 1fr 280px;
    }

    /* Globe canvas area */
    .globe-canvas-wrap {
      position: relative;
      height: 360px;
      background: radial-gradient(circle at 50% 50%, rgba(108,74,182,0.15), transparent 70%);
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid rgba(245,230,200,0.07);
      overflow: hidden;
    }
    #globeCanvas {
      cursor: grab;
      border-radius: 0;
    }
    #globeCanvas:active { cursor: grabbing; }

    .globe-hint {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      font-size: 11px; opacity: 0.4; white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      letter-spacing: 0.8px;
      color: #F5E6C8;
    }

    /* Country list panel */
    .country-panel {
      display: flex; flex-direction: column; height: 360px;
    }
    .country-search-wrap {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(245,230,200,0.07);
    }
    .country-search {
      width: 100%; padding: 10px 14px;
      background: rgba(7,7,16,0.7);
      border: 1px solid rgba(245,230,200,0.1);
      border-radius: 10px;
      color: #F5E6C8; font-family: 'Outfit', sans-serif; font-size: 14px;
    }
    .country-search::placeholder { color: rgba(245,230,200,0.3); }
    .country-search:focus { outline: none; border-color: rgba(108,74,182,0.5); }
    .country-list {
      flex: 1; overflow-y: auto; padding: 8px 8px;
    }
    .country-list::-webkit-scrollbar { width: 4px; }
    .country-list::-webkit-scrollbar-thumb { background: rgba(108,74,182,0.4); border-radius: 99px; }
    .country-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'Outfit', sans-serif; font-size: 14px; color: #F5E6C8;
      transition: background 0.15s ease;
    }
    .country-item:hover { background: rgba(108,74,182,0.15); }
    .country-item.selected { background: rgba(108,74,182,0.25); color: #a78bfa; font-weight: 600; }
    .country-flag { font-size: 18px; line-height: 1; }

    /* Selected country confirm bar */
    .globe-footer {
      padding: 14px 20px;
      border-top: 1px solid rgba(245,230,200,0.07);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .selected-country-display {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700; color: #F5E6C8;
      opacity: 0.5;
    }
    .selected-country-display.has-country { opacity: 1; color: #a78bfa; }
    .globe-confirm {
      padding: 10px 20px;
      background: linear-gradient(135deg, #6C4AB6, #a78bfa);
      border: none; border-radius: 12px;
      color: #050508; font-family: 'Space Grotesk', sans-serif;
      font-weight: 800; font-size: 12px; letter-spacing: 0.8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .globe-confirm:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,74,182,0.4); }
    .globe-confirm:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Tooltip on globe hover */
    .globe-tooltip {
      position: absolute;
      background: rgba(14,12,24,0.92);
      border: 1px solid rgba(108,74,182,0.4);
      color: #a78bfa;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px; font-weight: 700;
      padding: 6px 12px; border-radius: 8px;
      pointer-events: none;
      opacity: 0; transition: opacity 0.15s ease;
      white-space: nowrap; z-index: 10;
    }
    .globe-tooltip.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg-sunset"></div>
  <div class="bg-map"></div>
  <div class="bg-noise"></div>

  <a href="index.html" class="back-home">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
  </a>

  <main class="plan-page">
    <div class="plan-card">

      <!-- Brand -->
      <div class="plan-brand">
        <div class="plan-brand-mark">TN</div>
        <div class="plan-brand-text">
          <h1>Plan Your Trip</h1>
          <p>Smart routes &amp; stays, tailored for you</p>
        </div>
      </div>

      <div class="plan-divider"></div>

      <form id="planForm">

        <!-- Current Location -->
        <div class="field-group">
          <label class="field-label">
            <i class="fa-solid fa-location-dot" style="margin-right:5px;"></i>Current Location
          </label>
          <div class="input-row">
            <i class="fa-solid fa-map-marker-alt field-icon"></i>
            <input
              class="plan-input"
              type="text"
              id="currentLocation"
              placeholder="e.g. Mumbai, India"
              required
              autocomplete="off"
            />
            <button type="button" class="gps-btn" id="gpsBtn" title="Use my location">
              <i class="fa-solid fa-location-crosshairs" id="gpsIcon"></i>
            </button>
          </div>
          <div class="gps-chip" id="gpsChip">
            <i class="fa-solid fa-circle-check"></i>
            <span id="gpsChipText">Location detected</span>
          </div>
        </div>

        <!-- Destination -->
        <div class="field-group">
          <label class="field-label">
            <i class="fa-solid fa-paper-plane" style="margin-right:5px;"></i>Destination
          </label>
          <div class="input-row">
            <i class="fa-solid fa-flag field-icon"></i>
            <input
              class="plan-input"
              type="text"
              id="destination"
              placeholder="e.g. Paris, France"
              required
              autocomplete="off"
            />
            <button type="button" class="globe-btn" id="globeOpenBtn" title="Pick on globe">
              <i class="fa-solid fa-globe"></i>
            </button>
          </div>
        </div>

        <div class="plan-divider"></div>

        <!-- Date + Travelers -->
        <div class="two-col">
          <div class="field-group">
            <label class="field-label">
              <i class="fa-regular fa-calendar" style="margin-right:5px;"></i>Start Date
            </label>
            <div class="input-row">
              <i class="fa-regular fa-calendar field-icon"></i>
              <input class="plan-input" type="date" id="startDate" required style="padding-left:44px;" />
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">
              <i class="fa-solid fa-user-group" style="margin-right:5px;"></i>Travelers
            </label>
            <div class="stepper">
              <button type="button" class="step-btn minus"><i class="fa-solid fa-minus"></i></button>
              <input type="number" id="personCount" value="1" min="1" readonly />
              <button type="button" class="step-btn plus"><i class="fa-solid fa-plus"></i></button>
            </div>
          </div>
        </div>

        <button type="submit" class="plan-submit">
          Find Plans <i class="fa-solid fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </main>

  <!-- ── GLOBE MODAL ── -->
  <div class="globe-overlay" id="globeOverlay">
    <div class="globe-modal">
      <div class="globe-header">
        <div>
          <h3><i class="fa-solid fa-globe" style="color:#a78bfa;margin-right:8px;"></i>Pick Destination Country</h3>
          <p>Drag to rotate &bull; Click a country to select</p>
        </div>
        <button class="globe-close" id="globeClose"><i class="fa-solid fa-xmark"></i></button>
      </div>

      <div class="globe-body">
        <!-- Globe canvas -->
        <div class="globe-canvas-wrap">
          <canvas id="globeCanvas" width="340" height="340"></canvas>
          <div class="globe-tooltip" id="globeTooltip"></div>
          <div class="globe-hint">Drag to rotate &bull; Click to select</div>
        </div>

        <!-- Country list -->
        <div class="country-panel">
          <div class="country-search-wrap">
            <input class="country-search" id="countrySearch" placeholder="Search countries…" autocomplete="off" />
          </div>
          <div class="country-list" id="countryList"></div>
        </div>
      </div>

      <div class="globe-footer">
        <div class="selected-country-display" id="selectedDisplay">No country selected</div>
        <button class="globe-confirm" id="globeConfirm" disabled>
          Confirm &nbsp;<i class="fa-solid fa-check"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="script.js"></script>
  <script>
  // ─────────────────────────────────────────────
  // GPS LOCATION DETECTION
  // ─────────────────────────────────────────────
  const gpsBtn  = document.getElementById('gpsBtn');
  const gpsIcon = document.getElementById('gpsIcon');
  const gpsChip = document.getElementById('gpsChip');
  const gpsChipText = document.getElementById('gpsChipText');
  const locationInput = document.getElementById('currentLocation');

  gpsBtn.addEventListener('click', () => {
    if (!navigator.geolocation) {
      alert('Geolocation is not supported by your browser.');
      return;
    }
    // Show loading spinner
    gpsIcon.className = 'fa-solid fa-spinner';
    gpsBtn.classList.add('loading');

    navigator.geolocation.getCurrentPosition(
      async (pos) => {
        try {
          const { latitude, longitude } = pos.coords;
          // Reverse geocode using open API (no key needed)
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`
          );
          const data = await res.json();
          const addr = data.address || {};
          // Extract state + country only
          const state   = addr.state || addr.county || addr.region || '';
          const country = addr.country || '';
          const result  = [state, country].filter(Boolean).join(', ');

          locationInput.value = result;
          gpsChipText.textContent = `📍 ${result}`;
          gpsChip.classList.add('show');
          setTimeout(() => gpsChip.classList.remove('show'), 4000);
        } catch {
          locationInput.value = 'Could not fetch location';
        } finally {
          gpsIcon.className = 'fa-solid fa-location-crosshairs';
          gpsBtn.classList.remove('loading');
        }
      },
      (err) => {
        gpsIcon.className = 'fa-solid fa-location-crosshairs';
        gpsBtn.classList.remove('loading');
        if (err.code === err.PERMISSION_DENIED) {
          alert('Location access was denied. Please allow it in your browser settings.');
        }
      },
      { timeout: 10000 }
    );
  });

  // ─────────────────────────────────────────────
  // COUNTRY DATA (flag + name)
  // ─────────────────────────────────────────────
  const COUNTRIES = [
    {name:"Afghanistan",flag:"🇦🇫"},{name:"Albania",flag:"🇦🇱"},{name:"Algeria",flag:"🇩🇿"},
    {name:"Argentina",flag:"🇦🇷"},{name:"Armenia",flag:"🇦🇲"},{name:"Australia",flag:"🇦🇺"},
    {name:"Austria",flag:"🇦🇹"},{name:"Azerbaijan",flag:"🇦🇿"},{name:"Bahrain",flag:"🇧🇭"},
    {name:"Bangladesh",flag:"🇧🇩"},{name:"Belarus",flag:"🇧🇾"},{name:"Belgium",flag:"🇧🇪"},
    {name:"Bolivia",flag:"🇧🇴"},{name:"Bosnia",flag:"🇧🇦"},{name:"Brazil",flag:"🇧🇷"},
    {name:"Bulgaria",flag:"🇧🇬"},{name:"Cambodia",flag:"🇰🇭"},{name:"Cameroon",flag:"🇨🇲"},
    {name:"Canada",flag:"🇨🇦"},{name:"Chile",flag:"🇨🇱"},{name:"China",flag:"🇨🇳"},
    {name:"Colombia",flag:"🇨🇴"},{name:"Croatia",flag:"🇭🇷"},{name:"Cuba",flag:"🇨🇺"},
    {name:"Czech Republic",flag:"🇨🇿"},{name:"Denmark",flag:"🇩🇰"},{name:"Ecuador",flag:"🇪🇨"},
    {name:"Egypt",flag:"🇪🇬"},{name:"Ethiopia",flag:"🇪🇹"},{name:"Finland",flag:"🇫🇮"},
    {name:"France",flag:"🇫🇷"},{name:"Georgia",flag:"🇬🇪"},{name:"Germany",flag:"🇩🇪"},
    {name:"Ghana",flag:"🇬🇭"},{name:"Greece",flag:"🇬🇷"},{name:"Hungary",flag:"🇭🇺"},
    {name:"Iceland",flag:"🇮🇸"},{name:"India",flag:"🇮🇳"},{name:"Indonesia",flag:"🇮🇩"},
    {name:"Iran",flag:"🇮🇷"},{name:"Iraq",flag:"🇮🇶"},{name:"Ireland",flag:"🇮🇪"},
    {name:"Israel",flag:"🇮🇱"},{name:"Italy",flag:"🇮🇹"},{name:"Japan",flag:"🇯🇵"},
    {name:"Jordan",flag:"🇯🇴"},{name:"Kazakhstan",flag:"🇰🇿"},{name:"Kenya",flag:"🇰🇪"},
    {name:"Kuwait",flag:"🇰🇼"},{name:"Kyrgyzstan",flag:"🇰🇬"},{name:"Laos",flag:"🇱🇦"},
    {name:"Latvia",flag:"🇱🇻"},{name:"Lebanon",flag:"🇱🇧"},{name:"Libya",flag:"🇱🇾"},
    {name:"Lithuania",flag:"🇱🇹"},{name:"Luxembourg",flag:"🇱🇺"},{name:"Malaysia",flag:"🇲🇾"},
    {name:"Maldives",flag:"🇲🇻"},{name:"Mexico",flag:"🇲🇽"},{name:"Moldova",flag:"🇲🇩"},
    {name:"Mongolia",flag:"🇲🇳"},{name:"Morocco",flag:"🇲🇦"},{name:"Myanmar",flag:"🇲🇲"},
    {name:"Nepal",flag:"🇳🇵"},{name:"Netherlands",flag:"🇳🇱"},{name:"New Zealand",flag:"🇳🇿"},
    {name:"Nigeria",flag:"🇳🇬"},{name:"North Korea",flag:"🇰🇵"},{name:"Norway",flag:"🇳🇴"},
    {name:"Oman",flag:"🇴🇲"},{name:"Pakistan",flag:"🇵🇰"},{name:"Palestine",flag:"🇵🇸"},
    {name:"Panama",flag:"🇵🇦"},{name:"Peru",flag:"🇵🇪"},{name:"Philippines",flag:"🇵🇭"},
    {name:"Poland",flag:"🇵🇱"},{name:"Portugal",flag:"🇵🇹"},{name:"Qatar",flag:"🇶🇦"},
    {name:"Romania",flag:"🇷🇴"},{name:"Russia",flag:"🇷🇺"},{name:"Saudi Arabia",flag:"🇸🇦"},
    {name:"Serbia",flag:"🇷🇸"},{name:"Singapore",flag:"🇸🇬"},{name:"Slovakia",flag:"🇸🇰"},
    {name:"Slovenia",flag:"🇸🇮"},{name:"Somalia",flag:"🇸🇴"},{name:"South Africa",flag:"🇿🇦"},
    {name:"South Korea",flag:"🇰🇷"},{name:"Spain",flag:"🇪🇸"},{name:"Sri Lanka",flag:"🇱🇰"},
    {name:"Sudan",flag:"🇸🇩"},{name:"Sweden",flag:"🇸🇪"},{name:"Switzerland",flag:"🇨🇭"},
    {name:"Syria",flag:"🇸🇾"},{name:"Taiwan",flag:"🇹🇼"},{name:"Tajikistan",flag:"🇹🇯"},
    {name:"Tanzania",flag:"🇹🇿"},{name:"Thailand",flag:"🇹🇭"},{name:"Tunisia",flag:"🇹🇳"},
    {name:"Turkey",flag:"🇹🇷"},{name:"Turkmenistan",flag:"🇹🇲"},{name:"Uganda",flag:"🇺🇬"},
    {name:"Ukraine",flag:"🇺🇦"},{name:"United Arab Emirates",flag:"🇦🇪"},
    {name:"United Kingdom",flag:"🇬🇧"},{name:"United States",flag:"🇺🇸"},
    {name:"Uruguay",flag:"🇺🇾"},{name:"Uzbekistan",flag:"🇺🇿"},{name:"Venezuela",flag:"🇻🇪"},
    {name:"Vietnam",flag:"🇻🇳"},{name:"Yemen",flag:"🇾🇪"},{name:"Zimbabwe",flag:"🇿🇼"}
  ];

  // ─────────────────────────────────────────────
  // GLOBE RENDERER (pure canvas, no external lib)
  // ─────────────────────────────────────────────
  const canvas   = document.getElementById('globeCanvas');
  const ctx      = canvas.getContext('2d');
  const tooltip  = document.getElementById('globeTooltip');
  const R        = 148; // globe radius
  const CX = canvas.width  / 2;
  const CY = canvas.height / 2;

  // Rotation state
  let rotY  = 0.4;   // longitude offset (radians)
  let rotX  = 0.2;   // latitude tilt (radians)
  let dragStart = null;
  let autoRotate = true;
  let hoveredCountry = null;
  let selectedCountry = null;

  // Country lat/lon centroids (approximate)
  const CENTROIDS = {
    "Afghanistan":[33,65],"Albania":[41,20],"Algeria":[28,3],"Argentina":[-34,-64],
    "Armenia":[40,45],"Australia":[-25,133],"Austria":[47,14],"Azerbaijan":[40,48],
    "Bahrain":[26,50],"Bangladesh":[24,90],"Belarus":[53,28],"Belgium":[51,4],
    "Bolivia":[-17,-65],"Bosnia":[44,17],"Brazil":[-10,-55],"Bulgaria":[43,25],
    "Cambodia":[13,105],"Cameroon":[6,12],"Canada":[57,-96],"Chile":[-30,-71],
    "China":[35,103],"Colombia":[4,-72],"Croatia":[45,16],"Cuba":[22,-80],
    "Czech Republic":[50,15],"Denmark":[56,10],"Ecuador":[-2,-77],"Egypt":[27,30],
    "Ethiopia":[8,38],"Finland":[64,26],"France":[46,2],"Georgia":[42,43],
    "Germany":[51,10],"Ghana":[8,-1],"Greece":[39,22],"Hungary":[47,19],
    "Iceland":[65,-18],"India":[21,78],"Indonesia":[-5,120],"Iran":[32,53],
    "Iraq":[33,44],"Ireland":[53,-8],"Israel":[31,35],"Italy":[42,12],
    "Japan":[37,138],"Jordan":[31,36],"Kazakhstan":[48,68],"Kenya":[1,38],
    "Kuwait":[29,48],"Kyrgyzstan":[42,74],"Laos":[18,103],"Latvia":[57,25],
    "Lebanon":[34,36],"Libya":[27,17],"Lithuania":[56,24],"Luxembourg":[50,6],
    "Malaysia":[2,113],"Maldives":[4,73],"Mexico":[24,-102],"Moldova":[47,29],
    "Mongolia":[46,105],"Morocco":[32,-6],"Myanmar":[17,96],"Nepal":[28,84],
    "Netherlands":[52,5],"New Zealand":[-41,174],"Nigeria":[10,8],"North Korea":[40,127],
    "Norway":[62,10],"Oman":[22,58],"Pakistan":[31,69],"Palestine":[32,35],
    "Panama":[9,-80],"Peru":[-10,-76],"Philippines":[13,122],"Poland":[52,20],
    "Portugal":[39,-8],"Qatar":[25,51],"Romania":[46,25],"Russia":[62,94],
    "Saudi Arabia":[25,45],"Serbia":[44,21],"Singapore":[1,104],"Slovakia":[49,19],
    "Slovenia":[46,15],"Somalia":[6,46],"South Africa":[-30,25],"South Korea":[37,128],
    "Spain":[40,-4],"Sri Lanka":[8,81],"Sudan":[15,30],"Sweden":[62,16],
    "Switzerland":[47,8],"Syria":[35,38],"Taiwan":[24,121],"Tajikistan":[39,71],
    "Tanzania":[-6,35],"Thailand":[15,101],"Tunisia":[34,9],"Turkey":[39,35],
    "Turkmenistan":[40,60],"Uganda":[1,32],"Ukraine":[49,32],
    "United Arab Emirates":[24,54],"United Kingdom":[55,-3],"United States":[38,-97],
    "Uruguay":[-33,-56],"Uzbekistan":[41,64],"Venezuela":[8,-66],"Vietnam":[16,108],
    "Yemen":[16,48],"Zimbabwe":[-20,30]
  };

  // Project lat/lon to canvas x,y
  function project(lat, lon) {
    const phi   = (90 - lat)  * Math.PI / 180;
    const theta = (lon + 180) * Math.PI / 180;
    // Apply rotations
    const x0 = R * Math.sin(phi) * Math.cos(theta);
    const y0 = R * Math.cos(phi);
    const z0 = R * Math.sin(phi) * Math.sin(theta);
    // Rotate around Y (longitude)
    const x1 =  x0 * Math.cos(rotY) + z0 * Math.sin(rotY);
    const z1 = -x0 * Math.sin(rotY) + z0 * Math.cos(rotY);
    // Rotate around X (tilt)
    const y2 =  y0 * Math.cos(rotX) - z1 * Math.sin(rotX);
    const z2 =  y0 * Math.sin(rotX) + z1 * Math.cos(rotX);
    return { x: CX + x1, y: CY - y2, z: z2 };
  }

  function drawGlobe() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ocean
    const grad = ctx.createRadialGradient(CX - 30, CY - 30, 20, CX, CY, R);
    grad.addColorStop(0, '#1a1060');
    grad.addColorStop(0.6, '#0d0a30');
    grad.addColorStop(1, '#050318');
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Subtle grid lines
    ctx.strokeStyle = 'rgba(108,74,182,0.12)';
    ctx.lineWidth = 0.5;
    for (let lon = -180; lon <= 180; lon += 30) {
      ctx.beginPath();
      let first = true;
      for (let lat = -90; lat <= 90; lat += 5) {
        const p = project(lat, lon);
        if (p.z < 0) { first = true; continue; }
        first ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        first = false;
      }
      ctx.stroke();
    }
    for (let lat = -60; lat <= 60; lat += 30) {
      ctx.beginPath();
      let first = true;
      for (let lon = -180; lon <= 180; lon += 5) {
        const p = project(lat, lon);
        if (p.z < 0) { first = true; continue; }
        first ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        first = false;
      }
      ctx.stroke();
    }

    // Draw country dots
    for (const c of COUNTRIES) {
      const cent = CENTROIDS[c.name];
      if (!cent) continue;
      const p = project(cent[0], cent[1]);
      if (p.z < 0) continue; // behind globe

      const isHovered  = hoveredCountry === c.name;
      const isSelected = selectedCountry === c.name;

      const r = isSelected ? 6 : isHovered ? 5 : 3.5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);

      if (isSelected) {
        ctx.fillStyle = '#a78bfa';
        ctx.shadowColor = '#a78bfa';
        ctx.shadowBlur = 14;
      } else if (isHovered) {
        ctx.fillStyle = '#FF9F1C';
        ctx.shadowColor = '#FF9F1C';
        ctx.shadowBlur = 10;
      } else {
        ctx.fillStyle = 'rgba(46,196,182,0.65)';
        ctx.shadowBlur = 0;
      }
      ctx.fill();
      ctx.shadowBlur = 0;

      // Label for hovered / selected
      if (isHovered || isSelected) {
        ctx.fillStyle = isSelected ? '#a78bfa' : '#FF9F1C';
        ctx.font = `bold 11px 'Space Grotesk', sans-serif`;
        ctx.fillText(c.name, p.x + 8, p.y + 4);
      }
    }

    // Globe rim highlight
    const rim = ctx.createRadialGradient(CX - 55, CY - 55, R * 0.7, CX, CY, R);
    rim.addColorStop(0, 'rgba(255,255,255,0)');
    rim.addColorStop(0.8, 'rgba(255,255,255,0)');
    rim.addColorStop(1, 'rgba(108,74,182,0.25)');
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(108,74,182,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = rim;
    ctx.fill();

    // Shine
    const shine = ctx.createRadialGradient(CX - 55, CY - 50, 0, CX - 30, CY - 30, R * 0.7);
    shine.addColorStop(0, 'rgba(255,255,255,0.07)');
    shine.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(CX, CY, R, 0, Math.PI * 2);
    ctx.fillStyle = shine;
    ctx.fill();
  }

  // ── Auto rotation ──
  let animFrame;
  function animate() {
    if (autoRotate) rotY += 0.003;
    drawGlobe();
    animFrame = requestAnimationFrame(animate);
  }
  animate();

  // ── Drag to rotate ──
  canvas.addEventListener('mousedown', e => {
    dragStart = { x: e.clientX, y: e.clientY, rotY, rotX };
    autoRotate = false;
  });
  window.addEventListener('mousemove', e => {
    if (dragStart) {
      const dx = e.clientX - dragStart.x;
      const dy = e.clientY - dragStart.y;
      rotY = dragStart.rotY + dx * 0.008;
      rotX = Math.max(-0.6, Math.min(0.6, dragStart.rotX - dy * 0.008));
      hoveredCountry = null;
      tooltip.classList.remove('visible');
    } else {
      // Hover detection
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      let best = null, bestDist = 18;
      for (const c of COUNTRIES) {
        const cent = CENTROIDS[c.name];
        if (!cent) continue;
        const p = project(cent[0], cent[1]);
        if (p.z < 0) continue;
        const d = Math.hypot(mx - p.x, my - p.y);
        if (d < bestDist) { bestDist = d; best = c.name; }
      }
      hoveredCountry = best;
      if (best) {
        tooltip.textContent = COUNTRIES.find(c=>c.name===best)?.flag + '  ' + best;
        tooltip.style.left = (mx + 12) + 'px';
        tooltip.style.top  = (my - 24) + 'px';
        tooltip.classList.add('visible');
        canvas.style.cursor = 'pointer';
      } else {
        tooltip.classList.remove('visible');
        canvas.style.cursor = dragStart ? 'grabbing' : 'grab';
      }
    }
  });
  window.addEventListener('mouseup', () => { dragStart = null; });

  // Touch support
  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    dragStart = { x: t.clientX, y: t.clientY, rotY, rotX };
    autoRotate = false;
  }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    if (!dragStart) return;
    const t = e.touches[0];
    rotY = dragStart.rotY + (t.clientX - dragStart.x) * 0.01;
    rotX = Math.max(-0.6, Math.min(0.6, dragStart.rotX - (t.clientY - dragStart.y) * 0.01));
  }, { passive: true });
  canvas.addEventListener('touchend', () => { dragStart = null; });

  // ── Click to select ──
  canvas.addEventListener('click', e => {
    if (!hoveredCountry) return;
    selectCountry(hoveredCountry);
  });

  // ── Country list ──
  const listEl   = document.getElementById('countryList');
  const searchEl = document.getElementById('countrySearch');
  const displayEl = document.getElementById('selectedDisplay');
  const confirmBtn = document.getElementById('globeConfirm');

  function buildList(filter = '') {
    listEl.innerHTML = '';
    const filtered = COUNTRIES.filter(c =>
      c.name.toLowerCase().includes(filter.toLowerCase())
    );
    for (const c of filtered) {
      const item = document.createElement('div');
      item.className = 'country-item' + (c.name === selectedCountry ? ' selected' : '');
      item.innerHTML = `<span class="country-flag">${c.flag}</span><span>${c.name}</span>`;
      item.addEventListener('click', () => selectCountry(c.name));
      listEl.appendChild(item);
    }
  }
  buildList();

  searchEl.addEventListener('input', () => buildList(searchEl.value));

  function selectCountry(name) {
    selectedCountry = name;
    const c = COUNTRIES.find(x => x.name === name);
    displayEl.textContent = c ? c.flag + '  ' + c.name : name;
    displayEl.className = 'selected-country-display has-country';
    confirmBtn.disabled = false;
    buildList(searchEl.value);
    // Spin globe to that country
    const cent = CENTROIDS[name];
    if (cent) {
      autoRotate = false;
      const targetRotY = -(cent[1] * Math.PI / 180);
      rotY = targetRotY;
      rotX = cent[0] * Math.PI / 360;
    }
  }

  // ── Open / close modal ──
  const overlay   = document.getElementById('globeOverlay');
  const openBtn   = document.getElementById('globeOpenBtn');
  const closeBtn  = document.getElementById('globeClose');
  const destInput = document.getElementById('destination');

  openBtn.addEventListener('click', () => {
    overlay.classList.add('open');
    autoRotate = true;
    selectedCountry = null;
    displayEl.textContent = 'No country selected';
    displayEl.className = 'selected-country-display';
    confirmBtn.disabled = true;
    buildList();
    searchEl.value = '';
  });

  closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  confirmBtn.addEventListener('click', () => {
    if (selectedCountry) {
      destInput.value = selectedCountry;
      overlay.classList.remove('open');
    }
  });

  // ── Page-leave fade ──
  document.querySelectorAll('a[href]').forEach(a => {
    if (!a.href.startsWith('#') && a.href !== window.location.href) {
      a.addEventListener('click', e => {
        e.preventDefault(); const href = a.href;
        document.body.style.opacity = '0';
        document.body.style.transition = 'opacity 0.25s ease';
        setTimeout(() => { window.location = href; }, 260);
      });
    }
  });
  </script>
